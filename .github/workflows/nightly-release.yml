name: Build Nightly Release

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  RELEASE_TAG: nightly
  RELEASE_NAME: embedded.c3l - Nightly Release
  OUTPUT_NAME: embedded.c3l

jobs:
  build-nightly:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create archive
        run: |
          mkdir -p dist

          zip -r "dist/${OUTPUT_NAME}" \
            src \
            linked-libs \
            examples \
            LICENSE \
            README.md \
            manifest.json

      - name: Recreate nightly tag
        run: |
          git tag -f "${RELEASE_TAG}"
          git push origin "${RELEASE_TAG}" --force

      - name: Delete old nightly release
        run: |
          gh release delete "${RELEASE_TAG}" --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Recreate nightly tag after cleanup
        run: |
          git tag -f "${RELEASE_TAG}"
          git push origin "${RELEASE_TAG}" --force

      - name: Create nightly release
        run: |
          gh release create "${RELEASE_TAG}" \
            "dist/${OUTPUT_NAME}" \
            --title "${RELEASE_NAME}" \
            --notes "Automated nightly build from commit ${{ github.sha }}" \
            --prerelease
        env:
          GH_TOKEN: ${{ github.token }}
